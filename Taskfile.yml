version: "3"

# Env vars used by the app (see pkg/env, internal/db, pkg/logger, apps/api/rest, constants/jwt).
# If .env exists, its values override these defaults. Create .env from .env.example.
dotenv: [".env"]

vars:
  APP_NAME: '{{.APP_NAME | default "TEARest"}}'
  PORT: '{{.PORT | default "5000"}}'
  POSTGRES_USER: '{{.POSTGRES_USER | default "postgres"}}'
  POSTGRES_PASSWORD: '{{.POSTGRES_PASSWORD | default "postgres"}}'
  POSTGRES_DB: '{{.POSTGRES_DB | default "tearest"}}'
  JWT_MASTER_KEY: '{{.JWT_MASTER_KEY | default "12345678901234567890123456789012"}}'
  GO_ENV: '{{.GO_ENV | default "development"}}'

tasks:
  check_deps:
    desc: "Check dependencies (atlas and reflex) and install if missing"
    cmds:
      # Check and install Atlas if missing
      - |
        if ! command -v atlas &> /dev/null; then
          echo "Atlas not found. Installing..."
          curl -sSf https://atlasgo.sh | sh
        else
          echo "✓ Atlas already installed"
        fi

      # Check and install Reflex if missing
      - |
        if ! command -v reflex &> /dev/null; then
          echo "Reflex not found. Installing..."
          go install github.com/cespare/reflex@latest
        else
          echo "✓ Reflex already installed"
        fi

  "install:atlas":
    desc: "Install Atlas CLI"
    cmds:
      - curl -sSf https://atlasgo.sh | sh

  "install:reflex":
    desc: "Install reflex"
    cmds:
      - go install github.com/cespare/reflex@latest

  "local:docker:up":
    desc: Start Postgres 16 container (env vars from Taskfile)
    env:
      POSTGRES_USER: "{{.POSTGRES_USER}}"
      POSTGRES_PASSWORD: "{{.POSTGRES_PASSWORD}}"
      POSTGRES_DB: "{{.POSTGRES_DB}}"
    cmds:
      - docker compose up -d

  "local:api:watch":
    env:
      APP_NAME: "{{.APP_NAME}}"
      PORT: "{{.PORT}}"
      POSTGRES_DB_URL: "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}?sslmode=disable"
      JWT_MASTER_KEY: "{{.JWT_MASTER_KEY}}"
      GO_ENV: "{{.GO_ENV}}"
    cmds:
      - task: check_deps
      - reflex -r '\.go$$' -R '(^vendor/.*)' -s -- sh -c 'clear && go run ./apps/api'

  "migrate:diff":
    desc: "Generate a new versioned migration (Atlas CLI; needs Docker for dev DB). Usage: task migrate:diff -- name"
    cmds:
      - 'atlas migrate diff {{.CLI_ARGS}} --dir "file://internal/ent/migrate/migrations" --to "ent://internal/ent/schema" --dev-url "docker://postgres/16/tearest?search_path=public"'

  "migrate:diff:go":
    desc: "Generate a new versioned migration (Go script; no Atlas CLI). Postgres must be running. Usage: task migrate:diff:go -- name"
    env:
      POSTGRES_USER: "{{.POSTGRES_USER}}"
      POSTGRES_PASSWORD: "{{.POSTGRES_PASSWORD}}"
      POSTGRES_DB: "{{.POSTGRES_DB}}"
      POSTGRES_DB_URL: "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}"
    cmds:
      - go run -mod=mod ./internal/ent/migrate/main.go {{.CLI_ARGS}}

  "migrate:apply":
    desc: "Apply pending versioned migrations to the database"
    cmds:
      - 'atlas migrate apply --dir "file://internal/ent/migrate/migrations" --url "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}?sslmode=disable"'

  "migrate:status":
    desc: "Show migration status for the connected database"
    cmds:
      - 'atlas migrate status --dir "file://internal/ent/migrate/migrations" --url "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}?sslmode=disable"'

  "ent:generate":
    desc: "Generate ent schemas"
    dir: "./internal"
    cmds:
      - go generate ./ent

  "openapi:download":
    desc: "Download the merged OpenAPI spec (API must be running: task local:api:watch)"
    cmds:
      - mkdir -p ./dist
      - curl -sf -o ./dist/openapi.json "http://localhost:{{.PORT}}/openapi.json"

  "openapi:generate-clients":
    desc: "Generate TypeScript client from the OpenAPI spec (run openapi:download first)"
    cmds:
      - mkdir -p ./dist/clients
      - npx @openapitools/openapi-generator-cli generate -i ./dist/openapi.json -g typescript-axios -o ./dist/clients --additional-properties=withInterfaces=true,useSingleRequestParameter=false

  "openapi":
    desc: "Download OpenAPI spec and generate clients (API must be running)"
    cmds:
      - task: openapi:download
      - task: openapi:generate-clients
