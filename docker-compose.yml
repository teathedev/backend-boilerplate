services:
  postgres:
    image: postgres:16
    container_name: backend-boilerplate-postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tearest}
    ports:
      - "5432:5432"
    volumes:
      - backend_boilerplate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_boilerplate_pgdata:
    driver: local
    name: backend_boilerplate_pgdata
